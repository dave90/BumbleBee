name: Build & Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:       # allow manual trigger for testing

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        # macos-14 = arm64

    steps:
      - uses: actions/checkout@v4

      # Linux builds need QEMU for aarch64 cross-compilation
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm@20 || brew install llvm

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CC: ${{ runner.os == 'macOS' && '/opt/homebrew/opt/llvm@20/bin/clang' || '' }}
          CXX: ${{ runner.os == 'macOS' && '/opt/homebrew/opt/llvm@20/bin/clang++' || '' }}
          CXXFLAGS: ${{ runner.os == 'macOS' && '-stdlib=libc++' || '' }}
          LDFLAGS: ${{ runner.os == 'macOS' && '-stdlib=libc++ -L/opt/homebrew/opt/llvm@20/lib/c++ -Wl,-rpath,/opt/homebrew/opt/llvm@20/lib/c++' || '' }}
          # Build for CPython 3.9–3.13
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit, musl, and PyPy
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_* pp*"
          # Linux: build for x86_64 and aarch64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # macOS: native arch per runner
          CIBW_ARCHS_MACOS: "native"
          # Linux: install LLVM 20 (Clang + libc++) inside manylinux_2_34 (Fedora-based)
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y uuid-devel wget tar xz &&
            ARCH=$(uname -m) && if [ "$ARCH" = "x86_64" ]; then LLVM_ARCH=X64; else LLVM_ARCH=ARM64; fi &&
            wget -qO /tmp/llvm.tar.xz "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.0/LLVM-20.1.0-Linux-${LLVM_ARCH}.tar.xz" &&
            mkdir -p /opt/llvm && tar -xf /tmp/llvm.tar.xz -C /opt/llvm --strip-components=1 &&
            rm /tmp/llvm.tar.xz
          CIBW_BEFORE_BUILD_LINUX: "pip install pybind11"
          CIBW_ENVIRONMENT_LINUX: >
            PATH=/opt/llvm/bin:$PATH
            CC=clang CXX=clang++
            CXXFLAGS="-stdlib=libc++ -fPIC"
            LDFLAGS="-stdlib=libc++ -L/opt/llvm/lib -Wl,-rpath,/opt/llvm/lib"
          CIBW_BEFORE_BUILD_MACOS: "pip install pybind11"
          CIBW_ENVIRONMENT_PASS_MACOS: "CC CXX CXXFLAGS LDFLAGS"
          # Test the built wheel
          CIBW_TEST_REQUIRES: "pytest pandas pyarrow"
          CIBW_TEST_COMMAND: "python -c \"import bumblebeedb; db = bumblebeedb.db(); print('OK')\""
          # manylinux_2_34 provides glibc 2.34 needed by LLVM 20 pre-built binaries
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_34_x86_64"
          CIBW_MANYLINUX_AARCH64_IMAGE: "quay.io/pypa/manylinux_2_34_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    # Only publish on release events
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/bumblebee
    permissions:
      id-token: write  # for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1