name: Build & Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:       # allow manual trigger for testing

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-13, macos-14]
        # macos-13 = x86_64, macos-14 = arm64

    steps:
      - uses: actions/checkout@v4

      # Linux builds need QEMU for aarch64 cross-compilation
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          # Build for CPython 3.9–3.13
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit, musl, and PyPy
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_* pp*"
          # Linux: build for x86_64 and aarch64
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # macOS: native arch per runner
          CIBW_ARCHS_MACOS: "native"
          # Linux build dependencies (installed inside manylinux container)
          CIBW_BEFORE_BUILD_LINUX: >
            pip install pybind11 &&
            yum install -y uuid-devel || apk add --no-cache util-linux-dev
          # macOS build dependencies
          CIBW_BEFORE_BUILD_MACOS: "pip install pybind11"
          # Test the built wheel
          CIBW_TEST_REQUIRES: "pytest pandas pyarrow"
          CIBW_TEST_COMMAND: "python -c \"import bumblebeedb; db = bumblebeedb.db(); print('OK')\""
          # manylinux2_28 has a modern enough toolchain for C++20
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    # Only publish on release events
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/bumblebee
    permissions:
      id-token: write  # for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1