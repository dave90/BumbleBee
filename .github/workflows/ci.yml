name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # ── Install system dependencies ──
      - name: Add LLVM apt repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${UBUNTU_CODENAME}/ llvm-toolchain-${UBUNTU_CODENAME}-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-19 \
            libc++-19-dev \
            libc++abi-19-dev \
            uuid-dev \
            make \
            python3 \
            python3-dev \
            python3-pip \
            wget \
            ca-certificates

      - name: Install CMake 3.31
        run: |
          CMAKE_ARCH=$(uname -m)
          wget -qO /tmp/cmake.sh https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-${CMAKE_ARCH}.sh
          sudo sh /tmp/cmake.sh --skip-license --prefix=/usr/local

      # ── Install Python dependencies ──
      - name: Install Python packages
        run: |
          pip3 install pybind11 pandas pyarrow pytest

      # ── Configure & build (Release) ──
      - name: Configure Release build
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          cmake -B cmake-build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fPIC" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"

      - name: Build Release
        run: cmake --build cmake-build-release -j 2

      # ── Run tests ──
      - name: Create test output directories
        run: mkdir -p test/unit/bumblebee/function/data/output

      - name: Unit tests
        working-directory: cmake-build-release
        run: ctest -j $(nproc) --output-on-failure -E "AggRLHashTableTest\.(AddChunk_NoGroups|CombineUnsafe_NoGroups)|PhysicalExpressionTest\.PhysicalExpressionAssignmentMultiOpTest|WriteParquetTest\.WriteParquetMultiThread|ParserErrorTest\.ErrorContextBodyError"

      - name: E2E tests
        working-directory: test/e2e
        env:
          BUMBLEBEE_EXE: ../../cmake-build-release/BumbleBee
        run: pytest test.py -v

      - name: Python tests
        run: pytest python/test/test_examples.py -v